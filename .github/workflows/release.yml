name: "Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Silicon macs
            args: "--target aarch64-apple-darwin"
          - platform: "macos-12" # for Intel macs
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libhunspell-dev \
            libgtk-3-dev \
            pkg-config \
            libfuse2 \
            clang \
            libclang-dev \
            llvm-dev

      - name: install dependencies (macos only)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install hunspell pkg-config llvm
          # Ensure pkg-config can find hunspell
          echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/hunspell/lib/pkgconfig" >> $GITHUB_ENV
          # Set LIBCLANG_PATH for bindgen
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "PATH=$(brew --prefix llvm)/bin:$PATH" >> $GITHUB_ENV

      - name: install frontend dependencies
        run: npm install
        working-directory: ./tmbedit

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: tmbedit-v__VERSION__
          releaseName: "tmbedit v__VERSION__"
          releaseBody: "See the assets below to download the latest version of tmbedit."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: ./tmbedit
